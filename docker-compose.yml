version: '3.9'

services:
  # ============================================
  # PostgreSQL Database Service
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: library_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ${DB_NAME:-library_management_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # Persist database data across container restarts
      - postgres_data:/var/lib/postgresql/data
      # Optional: Initialize database with SQL script
      # - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - library_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-library_management_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Node.js Application Service
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Application Configuration
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      HOST: 0.0.0.0
      
      # Database Configuration
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/${DB_NAME:-library_management_db}
      
      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Mount node_modules to avoid overwriting them
      - /app/node_modules
      # Optional: Mount source code for development
      # - .:/app
    networks:
      - library_network
    restart: unless-stopped
    # Run database migrations before starting app
    command: >
      sh -c "npm run db:generate &&
             npm run db:migrate:prod &&
             npm run db:seed &&
             node src/server.js"

volumes:
  postgres_data:
    driver: local

networks:
  library_network:
    driver: bridge
